name: backend-tests

on:
  pull_request:
    paths:
      - "backend/**"
      - "src/lib/streamClient.ts"
      - ".github/workflows/backend-tests.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "src/lib/streamClient.ts"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r requirements.txt

      - name: Run backend pytest suite (includes SSE e2e guards)
        env:
          PYTHONPATH: .
        run: pytest -v

      - name: Re-run SSE e2e guard explicitly (visible in logs)
        env:
          PYTHONPATH: .
        run: pytest tests/e2e/test_sse_chat_e2e.py -v
